<!DOCTYPE html>
<html>

<head>

<title>Painel da Clínica</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.agenda-item{
display:flex;
align-items:center;
padding:10px;
margin-bottom:8px;
background:#f1f5f9;
border-radius:6px;
border-left:5px solid #3b82f6;
}

.hora{
font-weight:bold;
width:90px;
}

.paciente{
flex:1;
}

</style>

</head>

<body>

<h1>Painel da Clínica</h1>

<div class="card">

<input type="date" id="dataSelecionada">

<button onclick="buscarData()">Buscar</button>

<button onclick="hoje()">Hoje</button>

<button onclick="ontem()">Ontem</button>

<button onclick="amanha()">Amanhã</button>

</div>

<div class="card">

<h2>Agenda</h2>

<div id="agenda"></div>

</div>

<div class="card">

<h2>Resumo</h2>

<p>Consultas: <span id="consultas">0</span></p>

<p>Retornos: <span id="retornos">0</span></p>

<p>Cancelamentos: <span id="cancelamentos">0</span></p>

<p><b>Faturamento: R$ <span id="faturamento">0</span></b></p>

</div>

<script>

function formatarData(data){

const d = new Date(data);

const dia = String(d.getDate()).padStart(2,'0');
const mes = String(d.getMonth()+1).padStart(2,'0');
const ano = d.getFullYear();

return `${dia}-${mes}-${ano}`;

}

async function carregarAgenda(data){

const response = await fetch(`/api/agenda?data=${data}`);

const agenda = await response.json();

const lista = document.getElementById("agenda");

lista.innerHTML = "";

let consultas = 0;
let retornos = 0;
let cancelados = 0;
let faturamento = 0;

/* FILTRA SOMENTE A DATA SELECIONADA */

const agendaDoDia = agenda.content.filter(item => item.data === data);

/* ORDENA POR HORÁRIO */

agendaDoDia.sort((a,b)=>a.horario.localeCompare(b.horario));

agendaDoDia.forEach(item=>{

let tipo = "Consulta";

/* IDENTIFICA CONSULTA OU RETORNO PELO PROCEDIMENTO */

if(item.procedimento_id == 22){

tipo = "Retorno";
retornos++;

}else{

tipo = "Consulta";
consultas++;

}

/* CANCELAMENTOS */

if(item.status_id != 1){
cancelados++;
}

const horario = item.horario.substring(0,5);

const nome = item.paciente_nome;

const bloco = document.createElement("div");

bloco.className = "agenda-item";

bloco.innerHTML = `
<div class="hora">${horario}</div>
<div class="paciente">${tipo} - ${nome}</div>
`;

lista.appendChild(bloco);

/* FATURAMENTO */

if(item.valor){

const valor = item.valor.replace("R$","").replace(",",".");

faturamento += parseFloat(valor);

}

});

document.getElementById("consultas").innerText = consultas;

document.getElementById("retornos").innerText = retornos;

document.getElementById("cancelamentos").innerText = cancelados;

document.getElementById("faturamento").innerText = faturamento.toFixed(2);

}

function buscarData(){

const data = document.getElementById("dataSelecionada").value;

carregarAgenda(formatarData(data));

}

function hoje(){

const d = new Date();

document.getElementById("dataSelecionada").value = d.toISOString().split('T')[0];

carregarAgenda(formatarData(d));

}

function ontem(){

const d = new Date();

d.setDate(d.getDate()-1);

document.getElementById("dataSelecionada").value = d.toISOString().split('T')[0];

carregarAgenda(formatarData(d));

}

function amanha(){

const d = new Date();

d.setDate(d.getDate()+1);

document.getElementById("dataSelecionada").value = d.toISOString().split('T')[0];

carregarAgenda(formatarData(d));

}

/* CARREGA HOJE AUTOMATICAMENTE */

hoje();

</script>

</body>

</html>
