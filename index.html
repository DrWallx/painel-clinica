}

</style>

<ul>

<li>09:30 Maria Souza</li>

</ul>

</div>

<div class="card">

<h2>Resumo do Dia</h2>

<p>Consultas: 3</p>
<p>Retornos: 1</p>
<p>Cancelamentos: 0</p>

<h3>Faturamento: R$900</h3>

</div>

</body>

</html>
