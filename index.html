<!DOCTYPE html>
<html>
<head>
<title>Painel da Clínica</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

h1{
margin-bottom:30px;
}

.agenda-item{
display:flex;
align-items:center;
padding:10px;
margin-bottom:8px;
background:#f8fafc;
border-radius:6px;
border-left:5px solid #3b82f6;
}

.hora{
font-weight:bold;
width:90px;
}

.paciente{
flex:1;
}

.tipo{
font-size:12px;
background:#e2e8f0;
padding:3px 8px;
border-radius:5px;
margin-right:8px;
}

.cancelado{
border-left:5px solid #ef4444;
}

.faltou{
border-left:5px solid #f59e0b;
}

</style>

</head>

<body>

<h1>Painel da Clínica</h1>

<div class="card">

<h2>Agenda de Hoje</h2>

<div id="agenda"></div>

</div>

<div class="card">

<h2>Resumo do Dia</h2>

<p>Consultas: <span id="consultas">0</span></p>
<p>Retornos: <span id="retornos">0</span></p>
<p>Cancelamentos: <span id="cancelamentos">0</span></p>
<p><b>Faturamento: R$ <span id="faturamento">0</span></b></p>

</div>

<script>

async function carregarAgenda(){

const response = await fetch('/api/agenda');
const data = await response.json();

const lista = document.getElementById("agenda");

let consultas = 0;
let retornos = 0;
let cancelados = 0;
let faturamento = 0;

lista.innerHTML = "";

data.content.forEach(item =>{

let statusTexto = "Confirmado";
let classeStatus = "";

if(item.status_id == 2){
statusTexto = "Cancelado";
classeStatus = "cancelado";
cancelados++;
}

if(item.status_id == 3){
statusTexto = "Faltou";
classeStatus = "faltou";
}

if(item.status_id == 4){
statusTexto = "Reagendado";
}

let tipo = "Consulta";

if(item.retorno){
tipo = "Retorno";
retornos++;
}else{
consultas++;
}

const bloco = document.createElement("div");
bloco.className = "agenda-item " + classeStatus;

const horario = item.horario.substring(0,5);
const nome = item.paciente_nome || ("Paciente " + item.paciente_id);

bloco.innerHTML = `
<div class="hora">${horario}</div>
<div class="paciente">
<span class="tipo">${tipo}</span>
${nome} - ${statusTexto}
</div>
`;

lista.appendChild(bloco);

if(item.valor){

const valor = item.valor
.replace("R$","")
.replace(",",".")
.trim();

faturamento += parseFloat(valor) || 0;

}

});

document.getElementById("consultas").innerText = consultas;
document.getElementById("retornos").innerText = retornos;
document.getElementById("cancelamentos").innerText = cancelados;
document.getElementById("faturamento").innerText = faturamento.toFixed(2);

}

carregarAgenda();

setInterval(carregarAgenda,60000);

</script>

</body>
</html>
