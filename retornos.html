<!DOCTYPE html>
<html>

<head>
<title>Retornos</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:30px;
}

h2{
margin-top:30px;
}

.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.urgente{
border-left:5px solid #dc2626;
}

.proximo{
border-left:5px solid #f59e0b;
}

.ok{
border-left:5px solid #10b981;
}

.nome{
font-weight:bold;
font-size:16px;
}

.data{
font-size:14px;
color:#555;
}

.btn{
display:inline-block;
margin-top:10px;
padding:6px 10px;
background:#3b82f6;
color:white;
border-radius:5px;
text-decoration:none;
font-size:13px;
}
  .layout{
  display:flex;
}

.sidebar{
  width:220px;
  height:100vh;
  background:white;
  padding:20px;
  border-right:1px solid #e5e7eb;
}
  
.logo{
  margin-bottom:25px;
  font-size:20px;
  font-weight:600;
}

.menu-item{
  display:block;
  padding:10px 12px;
  border-radius:8px;
  margin-bottom:6px;
  text-decoration:none;
  color:#334155;
}

.menu-item:hover{
  background:#eef2ff;
  color:#4f46e5;
}

.content{
  flex:1;
  padding:30px;
}

  .grupo-titulo{
  font-size:14px;
  font-weight:600;
  margin-top:25px;
  margin-bottom:10px;
  display:flex;
  align-items:center;
  gap:8px;
  color:#334155;
}

/* bolinha */
.grupo-titulo::before{
  content:"";
  width:10px;
  height:10px;
  border-radius:50%;
  display:inline-block;
}

/* cores suaves */
.urgente-titulo::before{
  background:#ef4444;
}

.proximo-titulo::before{
  background:#f59e0b;
}

.ok-titulo::before{
  background:#10b981;
}
</style>

</head>

<body>

<div class="layout">

  <!-- MENU -->
  <aside class="sidebar">
   <div class="logo">
  <img src="/Email Signature Logo.png" style="width:120px;">
</div>

    <a href="/index.html" class="menu-item">📅 Agenda</a>
    <a href="/retornos.html" class="menu-item">🔁 Retornos</a>
    <a href="/producao.html" class="menu-item">📊 Produção</a>

    <hr style="margin:15px 0; border:none; border-top:1px solid #eee;">

     </aside>

  <!-- CONTEÚDO -->
  <main class="content">

    <h1>Retornos de Pacientes</h1>

<div class="grupo-titulo urgente-titulo">Urgentes</div>
<div id="urgente"></div>

<div class="grupo-titulo proximo-titulo">Próximos dias</div>
<div id="proximo"></div>

<div class="grupo-titulo ok-titulo">Dentro do prazo</div>
<div id="ok"></div>
<script>

async function carregar(){

const res = await fetch("/api/retornos")
const lista = await res.json()

const urgenteDiv = document.getElementById("urgente")
const proximoDiv = document.getElementById("proximo")
const okDiv = document.getElementById("ok")

urgenteDiv.innerHTML = ""
proximoDiv.innerHTML = ""
okDiv.innerHTML = ""

const hoje = new Date()

lista.forEach(p => {

const limite = new Date(p.data_limite_retorno)
const diff = Math.ceil((limite - hoje) / (1000*60*60*24))

let classe = ""
let destino = null
let texto = ""

if(diff <= 0){
classe = "urgente"
destino = urgenteDiv
texto = "Vencido ou vence hoje"
}
else if(diff <= 3){
classe = "proximo"
destino = proximoDiv
texto = `Vence em ${diff} dias`
}
else{
classe = "ok"
destino = okDiv
texto = `Vence em ${diff} dias`
}

destino.innerHTML += `
<div class="card ${classe}">
<div class="nome">${p.nome}</div>
<div class="data">Até: ${limite.toLocaleDateString()}</div>
<div class="data">${texto}</div>

<a class="btn" href="/paciente.html?paciente_id=${p.id}">
Abrir paciente
</a>

</div>
`

})

}

carregar()

</script>

  </main>

</div>

</body>
