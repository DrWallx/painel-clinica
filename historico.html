<!DOCTYPE html>
<html>

<head>
  <title>Histórico do Paciente</title>

  <style>
    body {
  margin:0;
  font-family: Arial;
  background: #f4f6f8;
}

    h1 {
      margin-bottom: 20px;
    }

    .mes {
      margin-top: 30px;
      font-size: 20px;
      font-weight: bold;
    }

    .card {
      background: white;
      padding: 15px;
      border-radius: 10px;
      margin-top: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .data {
      font-size: 13px;
      color: #666;
      margin-bottom: 10px;
    }

    a {
      display: block;
      margin: 4px 0;
      text-decoration: none;
      color: #2563eb;
    }

    button {
      margin-top: 10px;
      padding: 8px 12px;
      border: none;
      background: #3b82f6;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    .layout{
  display:flex;
}

.sidebar{
  width:220px;
  height:100vh;
  background:white;
  padding:20px;
  border-right:1px solid #e5e7eb;
}

.logo{
  margin-bottom:25px;
}

.menu-item{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  width:45px;
  height:45px;
  border-radius:12px;
  margin-bottom:12px;
  text-decoration:none;
  font-size:20px;
  color:#334155;
}

.menu-item:hover{
  background:#eef2ff;
  color:#4f46e5;
  transform:scale(1.08);
}

.menu-item.active{
  background:#6366f1;
  color:white;
}

.menu-item::after{
  content: attr(data-label);
  position:absolute;
  left:60px;
  top:50%;
  transform:translateY(-50%) translateX(-10px);
  background:#1f2937;
  color:#fff;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  font-weight:500;
  white-space:nowrap;
  opacity:0;
  transition:all 0.2s ease;
  box-shadow:0 6px 18px rgba(0,0,0,0.18);
}

.menu-item::before{
  content:"";
  position:absolute;
  left:52px;
  top:50%;
  transform:translateY(-50%) translateX(-10px);
  border-top:6px solid transparent;
  border-bottom:6px solid transparent;
  border-right:6px solid #1f2937;
  opacity:0;
  transition:all 0.2s ease;
}

.menu-item:hover::after,
.menu-item:hover::before{
  opacity:1;
  transform:translateY(-50%) translateX(0);
}

.content{
  flex:1;
  padding:30px;
}
  </style>

</head>

<body>

<div class="layout">

  <!-- MENU -->
  <aside class="sidebar">
    <div class="logo">
      <img src="/Email Signature Logo.png" style="width:120px;">
    </div>

  <a href="/index.html" class="menu-item" data-label="Agenda">📅</a>

<a href="/retornos.html" class="menu-item" data-label="Retornos">🔁</a>

<a href="/producao.html" class="menu-item" data-label="Produção">📊</a>

    <a href="/historico.html" class="menu-item">📂</a>
  </aside>

  <!-- CONTEÚDO -->
  <main class="content">

<h1>📂 Histórico do Paciente</h1>

<div id="historico"></div>

<script>

const params = new URLSearchParams(window.location.search)
const paciente_id = params.get("paciente_id")

async function carregar(){

  const res = await fetch(`/api/paciente?paciente_id=${paciente_id}&t=${Date.now()}`, {
    cache: "no-store"
  })

  const data = await res.json()

  console.log("DADOS RECEBIDOS:", data) // 🔥 DEBUG

  const historico = data.historico_envios || []
  const container = document.getElementById("historico")

  if(!historico.length){
    container.innerHTML = "<p>Sem histórico disponível</p>"
    return
  }

  const agrupado = {}

  historico.forEach(item => {

    const d = new Date(item.data)
    const chave = d.toLocaleString('pt-BR', { month: 'long', year: 'numeric' })

    if(!agrupado[chave]) agrupado[chave] = []
    agrupado[chave].push(item)
  })

  Object.keys(agrupado).forEach(mes => {

    container.innerHTML += `<div class="mes">📅 ${mes}</div>`

    agrupado[mes].forEach(item => {

      let html = `
        <div class="card">
          <div class="data">
            ${new Date(item.data).toLocaleString()}
          </div>
      `

      // ✅ RECEITAS (CORRIGIDO)
      if(item.receitas?.length){
        html += "<b>Receitas:</b>"
        item.receitas.forEach((r,i)=>{
          const url = typeof r === "string" ? r : r.url
          html += `<a href="${url}" target="_blank">📄 Receita ${i+1}</a>`
        })
      }

      // ✅ EXAMES (CORRIGIDO)
      if(item.exames?.length){
        html += "<b>Exames:</b>"
        item.exames.forEach((e,i)=>{
          const url = typeof e === "string" ? e : e.url
          html += `<a href="${url}" target="_blank">🧪 Exame ${i+1}</a>`
        })
      }

      // ✅ NOTAS (CORRIGIDO)
      if(item.notas?.length){
        html += "<b>Notas:</b>"
        item.notas.forEach((n,i)=>{
          const url = typeof n === "string" ? n : n.url
          html += `<a href="${url}" target="_blank">🧾 Nota ${i+1}</a>`
        })
      }

      html += `
        <button onclick='reenviar(${JSON.stringify(item)})'>
          📤 Reenviar documentos
        </button>
      </div>
      `

      container.innerHTML += html
    })

  })

}

async function reenviar(item){

  await fetch(`/api/enviarEmail?paciente_id=${paciente_id}`,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify(item)
  })

  alert("Reenvio realizado com sucesso")

}

carregar()

</script>

  </main>

</div>

</body>
