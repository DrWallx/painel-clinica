<!DOCTYPE html>
<html>

<head>

<title>Paciente</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

input{
padding:8px;
margin-top:5px;
margin-bottom:10px;
width:100%;
}

button{
padding:10px;
border:none;
background:#3b82f6;
color:white;
border-radius:5px;
cursor:pointer;
margin-right:10px;
}

button:hover{
background:#2563eb;
}

</style>

</head>

<body>

<h1>Paciente</h1>

<div class="card">

<h3>Dados do Paciente</h3>

<p><b>Nome:</b> <span id="nome"></span></p>
<p><b>Data de nascimento:</b> <span id="nascimento"></span></p>
<p><b>CPF:</b> <span id="cpf"></span></p>
<p><b>Email:</b> <span id="email"></span></p>
<p><b>Telefone:</b> <span id="telefone"></span></p>

<br>

<h4>Endereço</h4>

<p><b>CEP:</b> <span id="cep"></span></p>
<p><b>Rua:</b> <span id="rua"></span></p>
<p><b>Número:</b> <span id="numero"></span></p>
<p><b>Bairro:</b> <span id="bairro"></span></p>
<p><b>Cidade:</b> <span id="cidade"></span></p>
<p><b>Estado:</b> <span id="estado"></span></p>

</div>

<div class="card">

<h3>Controle de Retorno</h3>

<label>
<input type="checkbox" id="retorno_valido">
Paciente possui <b>direito de retorno</b>
</label>

<br><br>

<label>Data limite retorno</label>
<input type="date" id="data_retorno">

<button onclick="salvarRetorno()">Salvar</button>

</div>

<div class="card">

<h3>Receita (PDF)</h3>

<input type="file" id="receita" accept="application/pdf">

<button onclick="uploadReceita()">Enviar Receita</button>

</div>

<div class="card">

<h3>Nota Fiscal (PDF)</h3>

<input type="file" id="nota" accept="application/pdf">

<button onclick="uploadNota()">Enviar Nota</button>

</div>

<div class="card">

<h3>Enviar documentos</h3>

<button onclick="enviarReceita()">Enviar Receita</button>
<button onclick="enviarNota()">Enviar Nota</button>
<button onclick="enviarAmbos()">Enviar Ambos</button>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const paciente_id = params.get("paciente_id")

async function carregarPaciente(){

const response = await fetch(`/api/paciente?paciente_id=${paciente_id}`)
const data = await response.json()

document.getElementById("nome").innerText = data.nome
document.getElementById("nascimento").innerText = data.nascimento
document.getElementById("cpf").innerText = data.cpf
document.getElementById("email").innerText = data.email
document.getElementById("telefone").innerText = data.telefone

document.getElementById("cep").innerText = data.cep
document.getElementById("rua").innerText = data.rua
document.getElementById("numero").innerText = data.numero
document.getElementById("bairro").innerText = data.bairro
document.getElementById("cidade").innerText = data.cidade
document.getElementById("estado").innerText = data.estado

/* CALCULAR DATA LIMITE RETORNO */

if(data.dias_limite_retorno){

const hoje = new Date()

hoje.setDate(hoje.getDate() + data.dias_limite_retorno)

const ano = hoje.getFullYear()
const mes = String(hoje.getMonth()+1).padStart(2,'0')
const dia = String(hoje.getDate()).padStart(2,'0')

document.getElementById("data_retorno").value = `${ano}-${mes}-${dia}`

}

}

async function salvarRetorno(){

const retorno_valido = document.getElementById("retorno_valido").checked
const data_retorno = document.getElementById("data_retorno").value

await fetch("/api/salvarPaciente",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

paciente_id,
retorno_valido,
data_retorno

})

})

alert("Informação salva")

}

async function uploadReceita(){

const file = document.getElementById("receita").files[0]

const form = new FormData()

form.append("file",file)
form.append("paciente_id",paciente_id)
form.append("tipo","receita")

await fetch("/api/upload",{

method:"POST",
body:form

})

alert("Receita enviada")

}

async function uploadNota(){

const file = document.getElementById("nota").files[0]

const form = new FormData()

form.append("file",file)
form.append("paciente_id",paciente_id)
form.append("tipo","nota")

await fetch("/api/upload",{

method:"POST",
body:form

})

alert("Nota enviada")

}

async function enviarReceita(){

await fetch(`/api/enviarEmail?paciente_id=${paciente_id}&tipo=receita`)

alert("Receita enviada ao paciente")

}

async function enviarNota(){

await fetch(`/api/enviarEmail?paciente_id=${paciente_id}&tipo=nota`)

alert("Nota enviada ao paciente")

}

async function enviarAmbos(){

await fetch(`/api/enviarEmail?paciente_id=${paciente_id}&tipo=ambos`)

alert("Documentos enviados")

}

carregarPaciente()

</script>

</body>

</html>
