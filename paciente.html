<script>

const params = new URLSearchParams(window.location.search)
const paciente_id = params.get("paciente_id")

async function carregarPaciente(){

const response = await fetch(`/api/paciente?paciente_id=${paciente_id}`)
const data = await response.json()

document.getElementById("nome").innerText = data.nome
document.getElementById("nascimento").innerText = data.nascimento
document.getElementById("cpf").innerText = data.cpf

document.getElementById("email").innerText = data.email
document.getElementById("telefone").innerText = data.telefone

document.getElementById("cep").innerText = data.cep
document.getElementById("rua").innerText = data.rua
document.getElementById("numero").innerText = data.numero
document.getElementById("bairro").innerText = data.bairro
document.getElementById("cidade").innerText = data.cidade
document.getElementById("estado").innerText = data.estado

// 🔥 AQUI É A CORREÇÃO DO RETORNO
document.getElementById("retorno_valido").checked = !!data.retorno_valido

if(data.dias_limite_retorno){
document.getElementById("data_retorno").innerText = data.dias_limite_retorno
}

if(data.ultimo_envio){
document.getElementById("status_envio").innerText =
"Último envio: " + new Date(data.ultimo_envio).toLocaleString()
}

renderReceitas(data.receitas || [])
renderExames(data.exames || [])
renderNotas(data.notas || [])

}

/* 🔥 FUNÇÃO NOVA (RETORNO) */
async function salvarRetorno(){

const retorno_valido = document.getElementById("retorno_valido").checked

await fetch("/api/salvarPaciente",{

method:"POST",
headers:{ "Content-Type":"application/json" },

body:JSON.stringify({
paciente_id,
retorno_valido
})

})

alert("Retorno salvo")

}

/* RECEITAS */

async function adicionarReceita(){

const input = document.getElementById("receita_link")
const link = input.value.trim()

if(!link) return alert("Cole o link")

const res = await fetch(`/api/paciente?paciente_id=${paciente_id}`)
const paciente = await res.json()

let receitas = paciente.receitas || []

if(receitas.includes(link)){
alert("Link já adicionado")
return
}

receitas.push(link)

await fetch("/api/salvarPaciente",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ paciente_id, receitas })
})

renderReceitas(receitas)
input.value = ""

}

function renderReceitas(lista){
document.getElementById("lista_receitas").innerHTML =
lista.map((l,i)=>`
<p>
<a href="${l}" target="_blank">📄 Receita ${i+1}</a>
</p>`).join("")
}

if(!link) return alert("Cole o link")

/* NOTAS */

async function adicionarNota(){

const input = document.getElementById("nota")
const files = input.files

if(!files.length) return alert("Selecione arquivos")

const resPaciente = await fetch(`/api/paciente?paciente_id=${paciente_id}`)
const paciente = await resPaciente.json()

let notas = paciente.notas || []

for(let file of files){

const form = new FormData()
form.append("file", file)
form.append("paciente_id", paciente_id)
form.append("tipo","nota")

const response = await fetch("/api/upload",{
method:"POST",
body:form
})

const data = await response.json()

if(data.url && !notas.includes(data.url)){
notas.push(data.url)
}

}

await fetch("/api/salvarPaciente",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ paciente_id, notas })
})

renderNotas(notas)

input.value = ""

alert("Notas adicionadas")

}

function renderNotas(lista){
document.getElementById("lista_notas").innerHTML =
lista.map((l,i)=>`
<p>
<a href="${l}" target="_blank">🧾 Nota ${i+1}</a>
</p>`).join("")
}

/* ENVIO */

async function enviarReceita(){
await fetch(`/api/enviarEmail?paciente_id=${paciente_id}`)
alert("Receitas enviadas")
}

async function enviarNota(){
await fetch(`/api/enviarEmail?paciente_id=${paciente_id}`)
alert("Notas enviadas")
}

async function enviarAmbos(){
await fetch(`/api/enviarEmail?paciente_id=${paciente_id}`)
alert("Documentos enviados")
}

carregarPaciente()

</script>
