<!DOCTYPE html>
<html>

<head>

<title>Paciente</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
padding:10px;
border:none;
background:#3b82f6;
color:white;
border-radius:5px;
cursor:pointer;
margin-right:10px;
}

button:hover{
background:#2563eb;
}

input{
margin-top:10px;
margin-bottom:10px;
padding:8px;
width:100%;
}

</style>

</head>

<body>

<h1>Paciente</h1>

<div class="card">

<h3>Dados do Paciente</h3>

<p><b>Nome:</b> <span id="nome"></span></p>
<p><b>Data de nascimento:</b> <span id="nascimento"></span></p>
<p><b>CPF:</b> <span id="cpf"></span></p>
<p><b>Email:</b> <span id="email"></span></p>
<p><b>Telefone:</b> <span id="telefone"></span></p>

<br>

<h4>Endereço</h4>

<p><b>CEP:</b> <span id="cep"></span></p>
<p><b>Rua:</b> <span id="rua"></span></p>
<p><b>Número:</b> <span id="numero"></span></p>
<p><b>Bairro:</b> <span id="bairro"></span></p>
<p><b>Cidade:</b> <span id="cidade"></span></p>
<p><b>Estado:</b> <span id="estado"></span></p>

</div>

<div class="card">

<h3>Controle de Retorno</h3>

<label>
<input type="checkbox" id="retorno_valido">
Paciente possui <b>direito de retorno</b>
</label>

<br><br>

<p><b>Data limite retorno:</b> <span id="data_retorno"></span></p>

<button onclick="salvarRetorno()">Salvar</button>

</div>

<!-- RECEITAS -->
<div class="card">

<h3>Receitas (links)</h3>

<input type="text" id="receita_link" placeholder="Cole o link da receita">

<button onclick="adicionarReceita()">Adicionar receita</button>

<div id="lista_receitas"></div>

</div>

<!-- EXAMES -->
<div class="card">

<h3>Exames (links)</h3>

<input type="text" id="exame_link" placeholder="Cole o link do exame">

<button onclick="adicionarExame()">Adicionar exame</button>

<div id="lista_exames"></div>

</div>

<!-- NOTAS -->
<div class="card">

<h3>Notas fiscais (PDF)</h3>

<input type="file" id="nota" multiple accept="application/pdf">

<br>

<button onclick="adicionarNota()">Adicionar nota</button>

<div id="lista_notas"></div>

</div>

<!-- ENVIO -->
<div class="card">

<h3>Enviar documentos</h3>

<p id="status_envio" style="font-size:14px;color:#666;"></p>

<button onclick="enviarReceita()">Enviar Receita</button>
<button onclick="enviarNota()">Enviar Nota</button>
<button onclick="enviarAmbos()">Enviar Ambos</button>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const paciente_id = params.get("paciente_id")

async function carregarPaciente(){

const response = await fetch(`/api/paciente?paciente_id=${paciente_id}`)
const data = await response.json()

document.getElementById("nome").innerText = data.nome
document.getElementById("nascimento").innerText = data.nascimento
document.getElementById("cpf").innerText = data.cpf

document.getElementById("email").innerText = data.email
document.getElementById("telefone").innerText = data.telefone

document.getElementById("cep").innerText = data.cep
document.getElementById("rua").innerText = data.rua
document.getElementById("numero").innerText = data.numero
document.getElementById("bairro").innerText = data.bairro
document.getElementById("cidade").innerText = data.cidade
document.getElementById("estado").innerText = data.estado

if(data.dias_limite_retorno){
document.getElementById("data_retorno").innerText = data.dias_limite_retorno
}

if(data.ultimo_envio){
document.getElementById("status_envio").innerText =
"Último envio: " + new Date(data.ultimo_envio).toLocaleString()
}

renderReceitas(data.receitas || [])
renderExames(data.exames || [])
renderNotas(data.notas || [])

}

/* RECEITAS */

async function adicionarReceita(){

const input = document.getElementById("receita_link")
const link = input.value.trim()

if(!link) return alert("Cole o link")

const res = await fetch(`/api/paciente?paciente_id=${paciente_id}`)
const paciente = await res.json()

let receitas = paciente.receitas || []

if(receitas.includes(link)){
alert("Link já adicionado")
return
}

receitas.push(link)

await fetch("/api/salvarPaciente",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ paciente_id, receitas })
})

renderReceitas(receitas)
input.value = ""

}

function renderReceitas(lista){
document.getElementById("lista_receitas").innerHTML =
lista.map((l,i)=>`
<p>
<a href="${l}" target="_blank">📄 Receita ${i+1}</a>
</p>`).join("")
}

/* EXAMES */

async function adicionarExame(){

const input = document.getElementById("exame_link")
const link = input.value.trim()

if(!link) return alert("Cole o link")

const res = await fetch(`/api/paciente?paciente_id=${paciente_id}`)
const paciente = await res.json()

let exames = paciente.exames || []

if(exames.includes(link)){
alert("Link já adicionado")
return
}

exames.push(link)

await fetch("/api/salvarPaciente",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ paciente_id, exames })
})

renderExames(exames)
input.value = ""

}

function renderExames(lista){
document.getElementById("lista_exames").innerHTML =
lista.map((l,i)=>`
<p>
<a href="${l}" target="_blank">🧪 Exame ${i+1}</a>
</p>`).join("")
}

/* NOTAS */

async function adicionarNota(){

const input = document.getElementById("nota")
const files = input.files

if(!files.length) return alert("Selecione arquivos")

const resPaciente = await fetch(`/api/paciente?paciente_id=${paciente_id}`)
const paciente = await resPaciente.json()

let notas = paciente.notas || []

for(let file of files){

const form = new FormData()
form.append("file", file)
form.append("paciente_id", paciente_id)
form.append("tipo","nota")

const response = await fetch("/api/upload",{
method:"POST",
body:form
})

const data = await response.json()

if(data.url && !notas.includes(data.url)){
notas.push(data.url)
}

}

await fetch("/api/salvarPaciente",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ paciente_id, notas })
})

renderNotas(notas)

input.value = ""

alert("Notas adicionadas")

}

function renderNotas(lista){
document.getElementById("lista_notas").innerHTML =
lista.map((l,i)=>`
<p>
<a href="${l}" target="_blank">🧾 Nota ${i+1}</a>
</p>`).join("")
}

/* ENVIO */

async function enviarReceita(){
await fetch(`/api/enviarEmail?paciente_id=${paciente_id}`)
alert("Receitas enviadas")
}

async function enviarNota(){
await fetch(`/api/enviarEmail?paciente_id=${paciente_id}`)
alert("Notas enviadas")
}

async function enviarAmbos(){
await fetch(`/api/enviarEmail?paciente_id=${paciente_id}`)
alert("Documentos enviados")
}

carregarPaciente()

</script>

</body>
</html>
