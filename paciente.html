<!DOCTYPE html>
<html>

<head>
  <title>Paciente</title>

<style>

/* (CSS INALTERADO - EXATAMENTE IGUAL AO SEU) */

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
  background: linear-gradient(135deg, #eef2f6, #f8fafc);
  padding: 30px;
  color: #1f2937;
}

/* ... TODO O RESTANTE DO CSS IGUAL ... */

</style>
</head>

<body>

<h1>Paciente</h1>

<div class="grid">

  <div>

    <div class="card">
      <h3>Dados do Paciente</h3>

      <p><b>Paciente Id:</b> <span id="paciente_id"></span></p>
      <p><b>Nome:</b> <span id="nome"></span></p>
      <p><b>Data de nascimento:</b> <span id="nascimento"></span></p>
      <p><b>CPF:</b> <span id="cpf"></span></p>
      <p><b>Email:</b> <span id="email"></span></p>
      <p><b>Telefone:</b> <span id="telefone"></span></p>

      <br>

      <h4>Endereço</h4>

      <p><b>CEP:</b> <span id="cep"></span></p>
      <p><b>Rua:</b> <span id="rua"></span></p>
      <p><b>Número:</b> <span id="numero"></span></p>
      <p><b>Bairro:</b> <span id="bairro"></span></p>
      <p><b>Cidade:</b> <span id="cidade"></span></p>
      <p><b>Estado:</b> <span id="estado"></span></p>
    </div>

    <!-- RETORNO (INALTERADO) -->
    <div class="card card-retorno">
      <h3>Controle de Retorno</h3>

      <label>
        <input type="checkbox" id="retorno_valido">
        Paciente possui <b>direito de retorno</b>
      </label>

      <br><br>

      <p><b>Data limite retorno:</b> <span id="data_retorno"></span></p>

      <button onclick="salvarRetorno()">Salvar</button>
    </div>

    <div class="card historico-card">
      <h3>📂 Histórico do Paciente</h3>

      <p style="color:#6b7280; font-size:13px;">
        Acesse todos os envios realizados
      </p>

      <br>

      <button class="hist" onclick="verHistorico()">Ver histórico completo</button>
    </div>

  </div>

  <!-- DIREITA INALTERADA -->
  <div>
    <!-- (todo resto igual ao seu código) -->
  </div>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const paciente_id = params.get("paciente_id")

let dadosPacienteGlobal = null

async function carregarPaciente(){

  try{

    const response = await fetch(`/api/paciente?paciente_id=${paciente_id}`)
    const data = await response.json()

    if(!response.ok || !data){
      throw new Error("Erro na API")
    }

    dadosPacienteGlobal = data

    document.getElementById("paciente_id").innerText = "#" + paciente_id
    document.getElementById("nome").innerText = data.nome || ""
    document.getElementById("nascimento").innerText = data.nascimento || ""
    document.getElementById("cpf").innerText = data.cpf || ""
    document.getElementById("email").innerText = data.email || ""
    document.getElementById("telefone").innerText = data.telefone || ""

    document.getElementById("cep").innerText = data.cep || ""
    document.getElementById("rua").innerText = data.rua || ""
    document.getElementById("numero").innerText = data.numero || ""
    document.getElementById("bairro").innerText = data.bairro || ""
    document.getElementById("cidade").innerText = data.cidade || ""
    document.getElementById("estado").innerText = data.estado || ""

    // ✅ ALTERAÇÃO (SOMENTE AQUI)

    if(data.dias_limite_retorno){

      const hoje = new Date()
      hoje.setDate(hoje.getDate() + parseInt(data.dias_limite_retorno))

      const dataBR = hoje.toLocaleDateString('pt-BR')
      const dataISO = hoje.toISOString().split("T")[0]

      document.getElementById("data_retorno").innerText = dataBR

      // guarda para salvar
      window.dataRetornoCalculada = dataISO
    }

    document.getElementById("retorno_valido").checked = data.retorno_valido === true

    renderComFiltro()

  }catch(error){
    console.warn("Erro leve (ignorado):", error)
  }
}

function verHistorico(){
  window.location.href = `/historico.html?paciente_id=${paciente_id}`
}

carregarPaciente()

// ✅ ALTERAÇÃO (FUNÇÃO NOVA)

async function salvarRetorno(){

  const check = document.getElementById("retorno_valido").checked
  const data = window.dataRetornoCalculada

  if(!data){
    alert("Data de retorno não disponível")
    return
  }

  await fetch("/api/salvarPaciente",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      paciente_id,
      retorno_valido: check,
      data_limite_retorno: data
    })
  })

  alert("Retorno salvo com sucesso")

}

</script>

</body>
</html>
