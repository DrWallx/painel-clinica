<!DOCTYPE html>
<html>

<head>
<title>Paciente</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
padding:10px;
border:none;
background:#3b82f6;
color:white;
border-radius:5px;
cursor:pointer;
margin-right:10px;
}

button:hover{
background:#2563eb;
}

input{
margin-top:10px;
margin-bottom:10px;
padding:8px;
width:100%;
}
</style>
</head>

<body>

<h1>Paciente</h1>

<div class="card">
<h3>Dados do Paciente</h3>
<p><b>Nome:</b> <span id="nome"></span></p>
<p><b>Email:</b> <span id="email"></span></p>
</div>

<!-- RECEITAS -->
<div class="card">
<h3>Receitas</h3>
<input type="text" id="receita_link">
<button onclick="adicionarReceita()">Adicionar</button>
<div id="lista_receitas"></div>
</div>

<!-- EXAMES -->
<div class="card">
<h3>Exames</h3>
<input type="text" id="exame_link">
<button onclick="adicionarExame()">Adicionar</button>
<div id="lista_exames"></div>
</div>

<!-- NOTAS -->
<div class="card">
<h3>Notas</h3>
<input type="file" id="nota" multiple>
<button onclick="adicionarNota()">Adicionar nota</button>
<div id="lista_notas"></div>
</div>

<!-- ENVIO -->
<div class="card">
<h3>Enviar</h3>
<p id="status_envio"></p>
<button onclick="enviarNota()">Enviar</button>
</div>

<script>

const params = new URLSearchParams(window.location.search)
const paciente_id = params.get("paciente_id")

async function carregarPaciente(){

const res = await fetch(`/api/paciente?paciente_id=${paciente_id}`)
const data = await res.json()

document.getElementById("nome").innerText = data.nome
document.getElementById("email").innerText = data.email

if(data.ultimo_envio){
document.getElementById("status_envio").innerText =
"Último envio: " + new Date(data.ultimo_envio).toLocaleString()
}

renderReceitas(data.receitas || [])
renderExames(data.exames || [])
renderNotas(data.notas || [])

}

/* RECEITAS */

async function adicionarReceita(){

const input = document.getElementById("receita_link")
const link = input.value.trim()

if(!link) return alert("Cole o link")

const res = await fetch(`/api/paciente?paciente_id=${paciente_id}`)
const paciente = await res.json()

let receitas = paciente.receitas || []

if(receitas.includes(link)){
alert("Já existe")
return
}

receitas.push(link)

await fetch("/api/salvarPaciente",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ paciente_id, receitas })
})

renderReceitas(receitas)
input.value = ""

}

function renderReceitas(lista){
document.getElementById("lista_receitas").innerHTML =
lista.map((l,i)=>`<p>${l}</p>`).join("")
}

/* EXAMES */

async function adicionarExame(){

const input = document.getElementById("exame_link")
const link = input.value.trim()

if(!link) return alert("Cole o link")

const res = await fetch(`/api/paciente?paciente_id=${paciente_id}`)
const paciente = await res.json()

let exames = paciente.exames || []

if(exames.includes(link)){
alert("Já existe")
return
}

exames.push(link)

await fetch("/api/salvarPaciente",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ paciente_id, exames })
})

renderExames(exames)
input.value = ""

}

function renderExames(lista){
document.getElementById("lista_exames").innerHTML =
lista.map((l,i)=>`<p>${l}</p>`).join("")
}

/* NOTAS */

async function adicionarNota(){

const input = document.getElementById("nota")
const files = input.files

if(!files.length) return alert("Selecione arquivos")

const resPaciente = await fetch(`/api/paciente?paciente_id=${paciente_id}`)
const paciente = await resPaciente.json()

let notas = paciente.notas || []

for(let file of files){

const form = new FormData()
form.append("file", file)
form.append("paciente_id", paciente_id)
form.append("tipo","nota")

const response = await fetch("/api/upload",{
method:"POST",
body:form
})

const data = await response.json()

if(data.url && !notas.includes(data.url)){
notas.push(data.url)
}

}

await fetch("/api/salvarPaciente",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({ paciente_id, notas })
})

renderNotas(notas)

input.value = ""

alert("Notas adicionadas")

}

function renderNotas(lista){
document.getElementById("lista_notas").innerHTML =
lista.map((l,i)=>`<p><a href="${l}" target="_blank">Nota ${i+1}</a></p>`).join("")
}

/* ENVIO */

async function enviarNota(){

const res = await fetch(`/api/enviarEmail?paciente_id=${paciente_id}`)
const data = await res.json()

if(data.success){
alert("Enviado com sucesso")
carregarPaciente()
}else{
alert("Erro ao enviar")
}

}

carregarPaciente()

</script>

</body>
</html>
