<!DOCTYPE html>
<html>

<head>
  <title>Paciente</title>

<style>

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI";
  background: #eef2f6;
  padding: 20px;
  color: #1f2937;
}

/* HEADER PACIENTE */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: white;
  padding: 20px;
  border-radius: 14px;
  margin-bottom: 20px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

.header h1 {
  margin: 0;
  font-size: 22px;
}

.sub {
  font-size: 13px;
  color: #6b7280;
}

/* BADGE RETORNO */
.badge {
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
}

.badge.on {
  background: #dcfce7;
  color: #166534;
}

.badge.off {
  background: #fee2e2;
  color: #991b1b;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}

/* CARDS */
.card {
  background: white;
  padding: 20px;
  border-radius: 14px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.05);
}

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 8px;
  border: 1px solid #ddd;
}

/* BOTÕES */
button {
  padding: 8px 12px;
  border-radius: 8px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
  margin-right: 6px;
}

button:hover {
  background: #2563eb;
}

button.hist {
  background: #10b981;
}

button.hist:hover {
  background: #059669;
}

/* LISTAS */
#lista_receitas p,
#lista_exames p,
#lista_notas p {
  background: #f9fafb;
  padding: 6px;
  border-radius: 6px;
  margin-top: 5px;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div>
    <h1 id="nome"></h1>
    <div class="sub">
      CPF: <span id="cpf"></span> • 
      Tel: <span id="telefone"></span>
    </div>
  </div>

  <div>
    <span id="status_retorno" class="badge">—</span><br>
    Até: <b id="data_retorno"></b>
  </div>
</div>

<div class="grid">

  <!-- ESQUERDA -->
  <div>

    <div class="card">
      <h3>📋 Dados do Paciente</h3>

      <p><b>Nascimento:</b> <span id="nascimento"></span></p>
      <p><b>Email:</b> <span id="email"></span></p>

      <p><b>Endereço:</b></p>
      <p><span id="rua"></span>, <span id="numero"></span></p>
      <p><span id="bairro"></span> - <span id="cidade"></span></p>
      <p><span id="estado"></span></p>
    </div>

    <div class="card">
      <h3>🔁 Controle de Retorno</h3>

      <label>
        <input type="checkbox" id="retorno_valido">
        Paciente possui direito a retorno
      </label>

      <br><br>

      <button onclick="salvarRetorno()">Salvar</button>
      <button class="hist" onclick="verHistorico()">Histórico</button>
    </div>

  </div>

  <!-- DIREITA -->
  <div>

    <div class="card">
      <h3>📄 Receitas</h3>

      <input type="text" id="receita_link" placeholder="Cole o link">

      <button onclick="adicionarReceita()">Adicionar</button>

      <div id="lista_receitas"></div>
    </div>

    <div class="card">
      <h3>🧪 Exames</h3>

      <input type="text" id="exame_link" placeholder="Cole o link">

      <button onclick="adicionarExame()">Adicionar</button>

      <div id="lista_exames"></div>
    </div>

    <div class="card">
      <h3>🧾 Notas</h3>

      <input type="file" id="nota" multiple accept="application/pdf">

      <button onclick="adicionarNota()">Upload</button>

      <div id="lista_notas"></div>
    </div>

    <div class="card">
      <h3>📤 Envio</h3>

      <p id="status_envio"></p>

      <button onclick="enviarReceita()">Receita</button>
      <button onclick="enviarNota()">Nota</button>
      <button onclick="enviarAmbos()">Tudo</button>
    </div>

  </div>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const paciente_id = params.get("paciente_id")

async function carregarPaciente(){

  try{

    const response = await fetch(`/api/paciente?paciente_id=${paciente_id}`)
    const data = await response.json()

    document.getElementById("nome").innerText = data.nome || ""
    document.getElementById("nascimento").innerText = data.nascimento || ""
    document.getElementById("cpf").innerText = data.cpf || ""

    document.getElementById("email").innerText = data.email || ""
    document.getElementById("telefone").innerText = data.telefone || ""

    document.getElementById("rua").innerText = data.rua || ""
    document.getElementById("numero").innerText = data.numero || ""
    document.getElementById("bairro").innerText = data.bairro || ""
    document.getElementById("cidade").innerText = data.cidade || ""
    document.getElementById("estado").innerText = data.estado || ""

    document.getElementById("data_retorno").innerText = data.dias_limite_retorno || ""

    document.getElementById("retorno_valido").checked = data.retorno_valido === true

    // 🔥 BADGE
    const badge = document.getElementById("status_retorno")

    if(data.retorno_valido){
      badge.innerText = "Retorno ativo"
      badge.className = "badge on"
    }else{
      badge.innerText = "Sem retorno"
      badge.className = "badge off"
    }

    renderReceitas(data.receitas || [])
    renderExames(data.exames || [])
    renderNotas(data.notas || [])

  }catch(e){
    alert("Erro ao carregar paciente")
  }
}

/* MANTIVE TODO RESTO IGUAL */

function verHistorico(){
  window.location.href = `/historico.html?paciente_id=${paciente_id}`
}

carregarPaciente()

</script>

</body>
</html>
