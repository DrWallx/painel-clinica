<!DOCTYPE html>
<html>

<head>
<title>Paciente</title>

<style>
body{
font-family:Arial;
background:#f4f6f8;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
padding:10px;
border:none;
background:#3b82f6;
color:white;
border-radius:5px;
cursor:pointer;
margin-right:10px;
}

button:hover{
background:#2563eb;
}

input{
margin-top:10px;
margin-bottom:10px;
padding:8px;
width:100%;
}
</style>
</head>

<body>

<h1>Paciente</h1>

<div class="card">
<h3>Dados do Paciente</h3>

<p><b>Nome:</b> <span id="nome"></span></p>
<p><b>Data de nascimento:</b> <span id="nascimento"></span></p>
<p><b>CPF:</b> <span id="cpf"></span></p>
<p><b>Email:</b> <span id="email"></span></p>
<p><b>Telefone:</b> <span id="telefone"></span></p>

<br>

<h4>Endereço</h4>

<p><b>CEP:</b> <span id="cep"></span></p>
<p><b>Rua:</b> <span id="rua"></span></p>
<p><b>Número:</b> <span id="numero"></span></p>
<p><b>Bairro:</b> <span id="bairro"></span></p>
<p><b>Cidade:</b> <span id="cidade"></span></p>
<p><b>Estado:</b> <span id="estado"></span></p>
</div>

<div class="card">
<h3>Controle de Retorno</h3>

<label>
<input type="checkbox" id="retorno_valido">
Paciente possui <b>direito de retorno</b>
</label>

<br><br>

<p><b>Data limite retorno:</b> <span id="data_retorno"></span></p>

<button onclick="salvarRetorno()">Salvar</button>
</div>

<div class="card">
<h3>Receitas (links)</h3>
<input type="text" id="receita_link">
<button onclick="adicionarReceita()">Adicionar</button>
<div id="lista_receitas"></div>
</div>

<div class="card">
<h3>Exames (links)</h3>
<input type="text" id="exame_link">
<button onclick="adicionarExame()">Adicionar</button>
<div id="lista_exames"></div>
</div>

<div class="card">
<h3>Notas fiscais</h3>
<input type="file" id="nota" multiple>
<button onclick="uploadNota()">Enviar notas</button>
<div id="lista_notas"></div>
</div>

<div class="card">
<h3>Enviar documentos</h3>

<p id="status_envio" style="font-size:14px;color:#666;"></p>

<button onclick="enviarReceita()">Receita</button>
<button onclick="enviarNota()">Nota</button>
<button onclick="enviarAmbos()">Todos</button>
</div>

<script>

const params = new URLSearchParams(window.location.search)
const paciente_id = params.get("paciente_id")

async function carregarPaciente(){

const response = await fetch(`/api/paciente?paciente_id=${paciente_id}`)
const data = await response.json()

document.getElementById("nome").innerText = data.nome
document.getElementById("email").innerText = data.email

if(data.ultimo_envio){
document.getElementById("status_envio").innerText =
"Último envio: " + new Date(data.ultimo_envio).toLocaleString()
}

renderReceitas(data.receitas || [])
renderExames(data.exames || [])
renderNotas(data.notas || [])
}

function renderReceitas(lista){
const div = document.getElementById("lista_receitas")
div.innerHTML = lista.map((l,i)=>
`<p><a href="${l}" target="_blank">Receita ${i+1}</a>
<button onclick="removerReceita(${i})">❌</button></p>`
).join("")
}

function renderExames(lista){
const div = document.getElementById("lista_exames")
div.innerHTML = lista.map((l,i)=>
`<p><a href="${l}" target="_blank">Exame ${i+1}</a>
<button onclick="removerExame(${i})">❌</button></p>`
).join("")
}

function renderNotas(lista){
const div = document.getElementById("lista_notas")
div.innerHTML = lista.map((l,i)=>
`<p><a href="${l}" target="_blank">Nota ${i+1}</a>
<button onclick="removerNota(${i})">❌</button></p>`
).join("")
}

async function uploadNota(){
const files = document.getElementById("nota").files

for(let file of files){
const form = new FormData()
form.append("file", file)
form.append("paciente_id", paciente_id)
form.append("tipo","nota")

await fetch("/api/upload",{method:"POST",body:form})
}

carregarPaciente()
alert("Notas enviadas")
}

async function enviarNota(){

const res = await fetch(`/api/enviarEmail?paciente_id=${paciente_id}`)
const data = await res.json()

if(data.success){
alert("Enviado")
carregarPaciente()
}else{
alert("Erro")
}
}

async function enviarAmbos(){
await enviarNota()
}

async function enviarReceita(){
await enviarNota()
}

carregarPaciente()

</script>

</body>
</html>
