<!DOCTYPE html>
<html>
<head>
<title>Bioimpedância</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

.layout{
  display:flex;
}

.sidebar{
  width:220px;
  height:100vh;
  background:white;
  padding:20px;
  border-right:1px solid #e5e7eb;
}

.logo{
  display:flex;
  justify-content:center;
  margin-bottom:30px;
}

.menu-item{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  width:45px;
  height:45px;
  border-radius:12px;
  margin-bottom:12px;
  text-decoration:none;
  font-size:20px;
  color:#334155;
}

.menu-item:hover{
  background:#eef2ff;
  transform:scale(1.08);
}

.menu-item::after{
  content: attr(data-label);
  position:absolute;
  left:60px;
  top:50%;
  transform:translateY(-50%);
  background:#1f2937;
  color:white;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  opacity:0;
  transition:0.2s;
}

.menu-item:hover::after{
  opacity:1;
}

.content{
  flex:1;
  padding:30px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

label{
  font-size:13px;
  color:#555;
}

input{
  width:100%;
  padding:10px;
  margin-top:4px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  padding:10px 15px;
  border:none;
  background:#6366f1;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#4f46e5;
}
</style>

</head>

<body>

<div class="layout">

<aside class="sidebar">
  <div class="logo">
    <img src="/Email Signature Logo.png" style="width:120px;">
  </div>

  <a href="/index.html" class="menu-item" data-label="Agenda">📅</a>
  <a href="/retornos.html" class="menu-item" data-label="Retornos">🔁</a>
  <a href="/producao.html" class="menu-item" data-label="Produção">📊</a>
</aside>

<main class="content">

<h1>📊 Bioimpedância</h1>

<div class="grid">

<!-- TXT -->
<div class="card">
  <h3>Importar TXT</h3>
  <input type="file" id="arquivo">
  <button onclick="lerArquivo()">Importar TXT</button>
</div>

<!-- OCR -->
<div class="card">
  <h3>Importar Imagem (OCR)</h3>
  <input type="file" id="imagem">
  <button onclick="lerImagem()">Importar imagem</button>
</div>

<!-- DADOS -->
<div class="card">
  <h3>Dados do exame</h3>
  <label>Data</label>
  <input id="data">

  <label>Hora</label>
  <input id="hora">

  <label>Altura</label>
  <input id="altura">
</div>

<!-- COMPOSIÇÃO -->
<div class="card">
  <h3>Composição corporal</h3>

  <label>Peso</label>
  <input id="peso">

  <label>Água corporal</label>
  <input id="agua">

  <label>Gordura corporal</label>
  <input id="gordura">
</div>

<!-- OBESIDADE -->
<div class="card">
  <h3>Obesidade</h3>

  <label>IMC</label>
  <input id="imc">

  <label>% Gordura</label>
  <input id="pgc">
</div>

<!-- METABOLISMO -->
<div class="card">
  <h3>Metabolismo</h3>

  <label>TMB</label>
  <input id="tmb">
</div>

<!-- MANUAL -->
<div class="card">
  <h3>Medidas clínicas</h3>

  <label>Gordura visceral</label>
  <input id="visceral">

  <label>Abdômen</label>
  <input id="abdomen">
</div>

<div class="card">
  <button onclick="salvar()">Salvar exame</button>
</div>

</div>

</main>

</div>

<script>

function safe(v){
  return v ? v.replace(" ", ".") : ""
}

/* TXT */
function lerArquivo(){

  const file = document.getElementById("arquivo").files[0]
  if(!file) return alert("Selecione o arquivo")

  const reader = new FileReader()

  reader.onload = function(e){

    const dados = e.target.result.split(",")

    document.getElementById("data").value = dados[2] || ""
    document.getElementById("hora").value = dados[3] || ""
    document.getElementById("altura").value = safe(dados[4])
    document.getElementById("peso").value = safe(dados[5])

    if(dados[25]) document.getElementById("pgc").value = safe(dados[25])
    if(dados[30]) document.getElementById("tmb").value = dados[30]

  }

  reader.readAsText(file)
}

/* OCR */
async function lerImagem(){

  const file = document.getElementById("imagem").files[0]
  if(!file) return alert("Selecione uma imagem")

  alert("Lendo exame... aguarde ⏳")

  const { data: { text } } = await Tesseract.recognize(file, 'por')

  console.log(text)

  const extrair = (regex) => {
    const match = text.match(regex)
    return match ? match[1] : ""
  }

  document.getElementById("peso").value = extrair(/Peso\s+(\d+,\d+)/i)
  document.getElementById("gordura").value = extrair(/Gordura corporal\s+(\d+,\d+)/i)
  document.getElementById("agua").value = extrair(/Água corporal\s+(\d+,\d+)/i)
  document.getElementById("imc").value = extrair(/IMC.*?(\d+,\d+)/i)
  document.getElementById("pgc").value = extrair(/%.*?(\d+,\d+)/i)
  document.getElementById("tmb").value = extrair(/basal.*?(\d+)/i)

}

/* SALVAR */
function salvar(){

  const dados = {
    peso: document.getElementById("peso").value,
    gordura: document.getElementById("gordura").value
  }

  console.log(dados)
  alert("Pronto! Próximo passo: salvar no banco 🔥")
}

</script>

</body>
</html>
