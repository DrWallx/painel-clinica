<!DOCTYPE html>
<html>
<head>
<title>Bioimpedância</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

.layout{
  display:flex;
}

.sidebar{
  width:220px;
  height:100vh;
  background:white;
  padding:20px;
  border-right:1px solid #e5e7eb;
}

.logo{
  display:flex;
  justify-content:center;
  margin-bottom:30px;
}

.menu-item{
  display:flex;
  justify-content:center;
  align-items:center;
  width:45px;
  height:45px;
  border-radius:12px;
  margin-bottom:12px;
  font-size:20px;
  color:#334155;
}

.menu-item:hover{
  background:#eef2ff;
}

.content{
  flex:1;
  padding:30px;
}

.top{
  display:flex;
  justify-content:space-between;
  margin-bottom:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

.grid{
  display:grid;
  grid-template-columns:300px 1fr;
  gap:20px;
}

.lista{
  max-height:500px;
  overflow:auto;
}

.item{
  padding:10px;
  border-radius:8px;
  margin-bottom:6px;
  cursor:pointer;
}

.item:hover{
  background:#eef2ff;
}

.item.active{
  background:#6366f1;
  color:white;
}

.dados{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.bloco{
  background:#f9fafb;
  padding:15px;
  border-radius:10px;
}

.valor{
  font-size:20px;
  font-weight:bold;
}

input{
  padding:8px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  padding:8px 12px;
  border:none;
  background:#6366f1;
  color:white;
  border-radius:8px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="layout">

<aside class="sidebar">
  <div class="logo">
    <img src="/Email Signature Logo.png" style="width:120px;">
  </div>

  <div class="menu-item">📅</div>
  <div class="menu-item">🔁</div>
  <div class="menu-item">📊</div>
</aside>

<main class="content">

<h1>📊 Bioimpedância</h1>

<!-- ID BIO -->
<div class="card top">
  <div>
    <label>ID Bioimpedância</label><br>
    <input id="id_bio">
    <button onclick="salvarId()">Salvar</button>
  </div>
</div>

<div class="grid">

<!-- LISTA DE EXAMES -->
<div class="card lista" id="lista"></div>

<!-- DADOS -->
<div class="card">

<div class="dados">

<div class="bloco">
  <div>Peso</div>
  <div class="valor" id="peso">-</div>
</div>

<div class="bloco">
  <div>% Gordura</div>
  <div class="valor" id="gordura">-</div>
</div>

<div class="bloco">
  <div>Massa muscular</div>
  <div class="valor" id="musculo">-</div>
</div>

<div class="bloco">
  <div>TMB</div>
  <div class="valor" id="tmb">-</div>
</div>

<div class="bloco">
  <div>Gordura visceral</div>
  <div class="valor" id="visceral">-</div>
</div>

<div class="bloco">
  <div>Idade corporal</div>
  <div class="valor" id="idade">-</div>
</div>

</div>

</div>

</div>

</main>
</div>

<script>

const params = new URLSearchParams(window.location.search)
const paciente_id = params.get("paciente_id")

let exames = []

/* ================= SALVAR ID ================= */
async function salvarId(){

  const id_bio = document.getElementById("id_bio").value

  await fetch("/api/salvarBio", {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ paciente_id, id_bio })
  })

  alert("ID salvo")
}

/* ================= CARREGAR ================= */
async function carregar(){

  const res = await fetch(`/api/bio?paciente_id=${paciente_id}`)
  exames = await res.json()

  renderLista()
  renderExame(0)
}

/* ================= LISTA ================= */
function renderLista(){

  const div = document.getElementById("lista")
  div.innerHTML = ""

  exames.forEach((e,i)=>{

    div.innerHTML += `
      <div class="item" onclick="selecionar(${i})">
        📅 ${formatarData(e.measure_date)}
      </div>
    `
  })
}

/* ================= SELECIONAR ================= */
function selecionar(i){

  document.querySelectorAll(".item").forEach(el => el.classList.remove("active"))
  document.querySelectorAll(".item")[i].classList.add("active")

  renderExame(i)
}

/* ================= EXAME ================= */
function renderExame(i){

  const e = exames[i]

  document.getElementById("peso").innerText = e.weight
  document.getElementById("gordura").innerText = e.pbf_rate
  document.getElementById("musculo").innerText = e.muscle_quantity
  document.getElementById("tmb").innerText = e.bmr
  document.getElementById("visceral").innerText = e.mvf_quantity
  document.getElementById("idade").innerText = e.body_age
}

/* ================= UTIL ================= */
function formatarData(data){
  const d = new Date(data)
  return d.toLocaleDateString()
}

carregar()

</script>

</body>
</html>
