<!DOCTYPE html>
<html>
<head>
<title>Bioimpedância</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#f4f6f8;
}

.layout{
  display:flex;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:white;
  padding:20px;
  border-right:1px solid #e5e7eb;
}

.logo{
  display:flex;
  justify-content:center;
  margin-bottom:30px;
}

.menu-item{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  width:45px;
  height:45px;
  border-radius:12px;
  margin-bottom:12px;
  text-decoration:none;
  font-size:20px;
  color:#334155;
}

.menu-item:hover{
  background:#eef2ff;
  transform:scale(1.08);
}

.menu-item::after{
  content: attr(data-label);
  position:absolute;
  left:60px;
  top:50%;
  transform:translateY(-50%);
  background:#1f2937;
  color:white;
  padding:6px 10px;
  border-radius:8px;
  font-size:12px;
  opacity:0;
  transition:0.2s;
}

.menu-item:hover::after{
  opacity:1;
}

/* CONTEÚDO */
.content{
  flex:1;
  padding:30px;
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.card{
  background:white;
  padding:20px;
  border-radius:12px;
  box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

label{
  font-size:13px;
  color:#555;
}

input{
  width:100%;
  padding:10px;
  margin-top:4px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  padding:10px 15px;
  border:none;
  background:#6366f1;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

button:hover{
  background:#4f46e5;
}
</style>

</head>

<body>

<div class="layout">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <img src="/Email Signature Logo.png" style="width:120px;">
  </div>

  <a href="/index.html" class="menu-item" data-label="Agenda">📅</a>
  <a href="/retornos.html" class="menu-item" data-label="Retornos">🔁</a>
  <a href="/producao.html" class="menu-item" data-label="Produção">📊</a>
</aside>

<!-- CONTEÚDO -->
<main class="content">

<h1>📊 Bioimpedância</h1>

<div class="grid">

<!-- IMPORTAÇÃO -->
<div class="card">
  <h3>Importar TXT</h3>
  <input type="file" id="arquivo">
  <button onclick="lerArquivo()">Importar</button>
</div>

<!-- DADOS -->
<div class="card">
  <h3>Dados do exame</h3>

  <label>Data</label>
  <input id="data">

  <label>Hora</label>
  <input id="hora">

  <label>Altura (cm)</label>
  <input id="altura">

  <label>Idade</label>
  <input id="idade">
</div>

<!-- COMPOSIÇÃO -->
<div class="card">
  <h3>Composição corporal</h3>

  <label>Peso (kg)</label>
  <input id="peso">

  <label>Água corporal (L)</label>
  <input id="agua">

  <label>Proteína (kg)</label>
  <input id="proteina">

  <label>Minerais (kg)</label>
  <input id="minerais">

  <label>Gordura corporal (kg)</label>
  <input id="gordura">
</div>

<!-- MASSA -->
<div class="card">
  <h3>Massa corporal</h3>

  <label>Massa muscular (kg)</label>
  <input id="musculo">

  <label>Massa magra (kg)</label>
  <input id="massa_magra">

  <label>Massa gorda (kg)</label>
  <input id="massa_gorda">
</div>

<!-- OBESIDADE -->
<div class="card">
  <h3>Obesidade</h3>

  <label>IMC</label>
  <input id="imc">

  <label>% Gordura corporal</label>
  <input id="pgc">

  <label>RCQ</label>
  <input id="rcq">
</div>

<!-- METABOLISMO -->
<div class="card">
  <h3>Metabolismo</h3>

  <label>TMB (kcal)</label>
  <input id="tmb">

  <label>Idade biológica</label>
  <input id="idade_bio">

  <label>Pontuação corporal</label>
  <input id="score">
</div>

<!-- MEDIDAS -->
<div class="card">
  <h3>Medidas clínicas (manual)</h3>

  <label>Gordura visceral</label>
  <input id="visceral">

  <label>Abdômen</label>
  <input id="abdomen">

  <label>Cintura</label>
  <input id="cintura">

  <label>Braço direito</label>
  <input id="braco_dir">

  <label>Braço esquerdo</label>
  <input id="braco_esq">
</div>

<!-- AÇÕES -->
<div class="card">
  <h3>Ações</h3>
  <button onclick="salvar()">Salvar exame</button>
</div>

</div>

</main>

</div>

<script>

const params = new URLSearchParams(window.location.search)
const paciente_id = params.get("paciente_id")

function num(v){
  return v.replace(" ", ".")
}

function lerArquivo(){

  const file = document.getElementById("arquivo").files[0]

  if(!file){
    alert("Selecione o arquivo")
    return
  }

  const reader = new FileReader()

  reader.onload = function(e){

    const dados = e.target.result.split(",")

    // 🔥 DADOS PRINCIPAIS
    document.getElementById("data").value = dados[2]
    document.getElementById("hora").value = dados[3]
    document.getElementById("altura").value = num(dados[4])
    document.getElementById("peso").value = num(dados[5])

    // 🔥 COMPOSIÇÃO
    document.getElementById("agua").value = num(dados[6])
    document.getElementById("proteina").value = num(dados[7])
    document.getElementById("minerais").value = num(dados[8])
    document.getElementById("gordura").value = num(dados[9])

    // 🔥 OBESIDADE
    document.getElementById("imc").value = num(dados[24])
    document.getElementById("pgc").value = num(dados[25])

    // 🔥 METABOLISMO
    document.getElementById("tmb").value = dados[30]

  }

  reader.readAsText(file)
}

function salvar(){

  const dados = {
    paciente_id,
    data: document.getElementById("data").value,
    peso: document.getElementById("peso").value,
    gordura: document.getElementById("gordura").value
  }

  console.log("SALVANDO:", dados)

  alert("Próximo passo: salvar no banco 🔥")
}

</script>

</body>
</html>
