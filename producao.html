<!DOCTYPE html>
<html>

<head>
  <title>Produção</title>

<style>
body{
  font-family:Arial;
  background:#f4f6f8;
  padding:30px;
}

.card{
  background:white;
  padding:20px;
  border-radius:10px;
  margin-bottom:20px;
}

h2{
  margin-top:30px;
}

table{
  width:100%;
  border-collapse:collapse;
}

th,td{
  padding:10px;
  border-bottom:1px solid #ddd;
  text-align:left;
}

  .layout{
  display:flex;
}

.sidebar{
  width:220px;
  height:100vh;
  background:white;
  padding:20px;
  border-right:1px solid #e5e7eb;
}

.logo{
  margin-bottom:25px;
  font-size:20px;
  font-weight:600;
}

.menu-item{
  display:block;
  padding:10px 12px;
  border-radius:8px;
  margin-bottom:6px;
  text-decoration:none;
  color:#334155;
}

.menu-item:hover{
  background:#eef2ff;
  color:#4f46e5;
}

.content{
  flex:1;
  padding:30px;
}
</style>

</head>

<body>

<div class="layout">

  <!-- MENU -->
  <aside class="sidebar">
    <h2 class="logo">Haux</h2>

    <a href="/index.html" class="menu-item">📅 Agenda</a>
    <a href="/retornos.html" class="menu-item">🔁 Retornos</a>
    <a href="/producao.html" class="menu-item">📊 Produção</a>

    <hr style="margin:15px 0; border:none; border-top:1px solid #eee;">

    <a href="/historico.html" class="menu-item">📂 Histórico</a>
  </aside>

  <!-- CONTEÚDO -->
  <main class="content">

<h1>📊 Produção Clínica</h1>

<div class="card" id="geral"></div>

<h2>📅 Produção Mensal</h2>

<div class="card">
  <table id="tabela">
    <thead>
      <tr>
        <th>Mês</th>
        <th>Consultas</th>
        <th>Retornos</th>
        <th>Cancelamentos</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<script>

async function carregar(){

  const res = await fetch("/api/producao")
  const data = await res.json()

  // 🔥 geral
  document.getElementById("geral").innerHTML = `
    <h3>Resumo Geral (desde 01/01/2025)</h3>
    <p><b>Consultas:</b> ${data.total.consultas}</p>
    <p><b>Retornos:</b> ${data.total.retornos}</p>
    <p><b>Cancelamentos:</b> ${data.total.cancelamentos}</p>
  `

  // 🔥 tabela
  const tbody = document.querySelector("#tabela tbody")

  Object.entries(data.meses).forEach(([mes, v]) => {

    tbody.innerHTML += `
      <tr>
        <td>${mes}</td>
        <td>${v.consultas}</td>
        <td>${v.retornos}</td>
        <td>${v.cancelamentos}</td>
      </tr>
    `

  })

}

carregar()

</script>

  </main>

</div>

</body>
